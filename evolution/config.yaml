# AscendC Kernel Agent — 进化配置

# 算子配置（启动进化前修改为目标算子）
operator_name: gelu_custom
target_chip: Ascend910B
operator_spec_path: workspace/specs/gelu_custom.md

# 自定义算子工程配置
project_mode: custom_operator    # custom_operator | direct_invoke (兼容)
op_capital_name: GeluCustom      # PascalCase 算子名
msopgen_device: ai_core-Ascend910B

# 工作区
runs_dir: workspace/runs/gelu_custom
deploy_dir: workspace/deploy/opp
cpp_extension_dir: workspace/runs/gelu_custom/test/CppExtension
reference_py: workspace/runs/gelu_custom/test/reference.py

# 进化参数
max_wall_time: 168h         # 最大运行时间（7 天）
max_versions: 100           # 最大提交版本数
max_session_duration: 15m   # 单次 Agent 会话最大时长
stall_threshold: 3          # 连续"正确但无提升"触发重定向（从 5 降到 3，基于 GELU 进化经验）
max_failed_attempts: 5      # 连续失败触发 repair 模式
max_consecutive_redirects: 3  # 连续重定向失败则停止

# 评分配置
scoring_config_path: scoring/configs/gelu_custom.json
metric_type: latency_us     # tflops | bandwidth_gbps | latency_us
min_improvement_ratio: 0.02  # 最小提升门槛 2%
warmup_rounds: 10
repeat_rounds: 100

# 正确性测试
num_correct_trials: 5        # PyTorch 正确性测试轮数

# 目标（可选，设置后达标即停）
target_performance: null

# Agent Team 配置
team_definition: agents/AGENTS.md
architect_agent: agents/architect/AGENT.md
developer_agent: agents/developer/AGENT.md
reviewer_agent: agents/reviewer/AGENT.md
tester_agent: agents/tester/AGENT.md
supervisor_agent: agents/supervisor/AGENT.md
